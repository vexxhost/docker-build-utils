name: release

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      issues: write
      packages: write
      pull-requests: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Create release
        id: release
        uses: googleapis/release-please-action@8b8fd2cc23b2e18957157a9d923d75aa0c6f6ad5 # v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Build and publish image
        if: steps.release.outputs.release_created == 'true'
        uses: vexxhost/docker-atmosphere/.github/actions/build-image@79e8411aedb8be0314bfdbd34f75d61cd77917a6 # codex/build-image-release-tags
        with:
          image-name: build-utils
          push: true
          tag-version: ${{ steps.release.outputs.tag_name }}
